<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qidiruv</title>

    <style>

        body{
            margin:0;
            padding:20px;
            font-family:Arial, sans-serif;
            background:#f5f5f5;
        }

        .top{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .back-btn{
            text-decoration:none;
            background:black;
            color:white;
            padding:12px 18px;
            border-radius:10px;
            font-size:16px;
        }

        .search-form{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .search-input{
            width:300px;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .search-btn{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:black;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        .products{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .card{
            background:white;
            width:230px;
            border-radius:15px;
            padding:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .card h3{
            margin-top:12px;
            margin-bottom:10px;
        }

        .price{
            font-size:18px;
            font-weight:bold;
        }

        .empty{
            font-size:20px;
            margin-top:30px;
        }

    </style>

</head>
<body>

    <div class="top">

        <a href="/" class="back-btn">
            ⬅ Orqaga
        </a>

        <form method="GET"
              action="{% url 'search' %}"
              class="search-form">

            <input type="text"
                   name="q"
                   value="{{ query }}"
                   placeholder="Mahsulot qidirish..."
                   class="search-input">

            <button type="submit" class="search-btn">
                🔍 Qidirish
            </button>

        </form>

    </div>

    <div class="products">

        {% for product in results %}

            <div class="card">

                <img src="{{ product.image.url }}"
                     alt="{{ product.name }}">

                <h3>{{ product.name }}</h3>

                <p class="price">
                    {{ product.price }} so'm
                </p>

            </div>

        {% empty %}

            <p class="empty">
                Mahsulot topilmadi
            </p>

        {% endfor %}

    </div>

</body>
</html>
