{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
        <h4 class="fw-bold mb-3">Profilni tahrirlash</h4>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="first_name" class="form-control mb-2" value="{{ user.first_name }}" placeholder="Ism">
            <input type="text" name="last_name" class="form-control mb-2" value="{{ user.last_name }}" placeholder="Familiya">
            <input type="email" name="email" class="form-control mb-2" value="{{ user.email }}" placeholder="Email">
            <input type="text" name="phone" class="form-control mb-2" value="{{ profile.phone }}" placeholder="Telefon">
            <button type="submit" class="btn btn-primary w-100">Saqlash</button>
        </form>
    </div>
</div>
{% endblock %}
