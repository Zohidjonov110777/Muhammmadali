{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-header">
            <h2>Ro'yxatdan o'tish</h2>
            <p class="auth-subtitle">Yangi akkaunt yarating va xaridlarni boshlang</p>
        </div>

        <form method="POST" action="{% url 'account_signup' %}" class="auth-form">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="auth-input">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <span class="error-text">{{ field.errors|striptags }}</span>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="auth-btn">RO'YXATDAN O'TISH</button>
        </form>

        <div class="auth-footer-text">
            Akkauntingiz bormi? <a href="{% url 'account_login' %}">Kirish</a>
        </div>
    </div>
</div>
{% endblock %}
