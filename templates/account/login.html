{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-header">
            <h2>Xush kelibsiz!</h2>
            <p class="auth-subtitle">Davom etish uchun tizimga kiring</p>
        </div>

        <form method="POST" action="{% url 'account_login' %}" class="auth-form">
            {% csrf_token %}
            
            <div class="auth-input">
                <label>Foydalanuvchi nomi</label>
                <input type="text" name="login" placeholder="Username" required>
            </div>

            <div class="auth-input">
                <label>Parol</label>
                <input type="password" name="password" placeholder="Parol" required>
            </div>

            <button type="submit" class="auth-btn">KIRISH</button>
        </form>

        <div class="auth-footer-text">
            Akkauntingiz yo'qmi? <a href="{% url 'account_signup' %}">Ro'yxatdan o'tish</a>
        </div>
    </div>
</div>
{% endblock %}
